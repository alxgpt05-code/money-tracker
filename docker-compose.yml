services:
  postgres:
    image: postgres:16-alpine
    container_name: capital-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: capital_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d capital_tracker"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
