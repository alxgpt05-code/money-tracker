version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: expense_mvp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: expense_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: expense_mvp_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "3000:3000"

volumes:
  postgres_data:
